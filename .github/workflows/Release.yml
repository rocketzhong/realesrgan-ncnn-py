name: Release
on:
  workflow_dispatch:

env:
  GITHUB_ACTIONS: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      DATE: ${{ steps.get_date.outputs.DATE }}
    steps:
      - name: Get current date
        id: get_date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pdm-project/setup-pdm@v4
        name: Setup PDM
        with:
          python-version: "3.14"
          architecture: x64
          version: 3.0.0
          allow-python-prereleases: true
      - name: Check Python version
        run: python --version
      - name: cache-vulkansdk
        id: cache-vulkansdk
        uses: actions/cache@v4
        with:
          path: "VulkanSDK"
          key: VulkanSDK-1.3.296.0
      - name: vulkansdk
        if: steps.cache-vulkansdk.outputs.cache-hit != 'true'
        run: |
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/1.3.296.0/windows/VulkanSDK-1.3.296.0-Installer.exe" -OutFile VulkanSDK-1.3.296.0-Installer.exe
          7z x -aoa ./VulkanSDK-1.3.296.0-Installer.exe -oVulkanSDK
          Remove-Item .\VulkanSDK\Demos, .\VulkanSDK\Samples, .\VulkanSDK\Third-Party, .\VulkanSDK\Tools, .\VulkanSDK\Tools32, .\VulkanSDK\Bin32, .\VulkanSDK\Lib32 -Recurse -Force
      - name: Build
        run: |
          $env:VULKAN_SDK="$(pwd)\VulkanSDK"
          cd src
          mkdir build && cd build
          cmake -A x64 -DCMAKE_CXX_FLAGS="-frtti -fexceptions" ..
          cmake --build . --config Release -j 4
      - name: pre build wheel
        run: |
          echo F | xcopy .\src\build\Release\realesrgan_ncnn_vulkan_wrapper.*.pyd .\src\realesrgan_ncnn_py
      - name: build python 3.14 wheel
        run: pdm build --no-sdist --config-setting="--python-tag=cp314" --config-setting="--plat-name=win_amd64"
      - name: upload
        uses: actions/upload-artifact@v4
        with:
          path: dist

  Release:
    needs: [setup, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: asset
          merge-multiple: true
      - name: dist
        run: |
          mkdir dist
          cp asset/* dist/ 2>/dev/null || true
          cd dist && ls -la
      - name: Publish to PyPI
        if: github.event_name == 'workflow_dispatch'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API }}
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ needs.setup.outputs.DATE }}
          tag_name: ${{ needs.setup.outputs.DATE }}
          body: Auto Release for Python 3.14
          draft: false
          prerelease: false
          files: dist/*
